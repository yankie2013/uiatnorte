<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sin conexión | UIAT Norte</title>
<meta name="theme-color" content="#0d1526">
<style>
  :root{
    --bg:#07111f;
    --panel:rgba(10,18,34,.88);
    --line:rgba(255,255,255,.12);
    --text:#e5eef8;
    --muted:rgba(229,238,248,.72);
    --accent:#d4af37;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    background:
      radial-gradient(circle at top left, rgba(212,175,55,.18), transparent 36%),
      radial-gradient(circle at bottom right, rgba(59,130,246,.18), transparent 32%),
      linear-gradient(180deg, #030712, var(--bg));
  }
  .card{
    width:min(560px, 100%);
    padding:28px;
    border:1px solid var(--line);
    border-radius:24px;
    background:var(--panel);
    box-shadow:0 30px 60px rgba(0,0,0,.28);
    backdrop-filter:blur(12px);
  }
  .badge{
    display:inline-flex;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(212,175,55,.14);
    color:#f5deb3;
    font-weight:700;
    letter-spacing:.02em;
  }
  h1{
    margin:18px 0 10px;
    font-size:clamp(1.9rem, 5vw, 2.8rem);
    line-height:1.1;
  }
  p{
    margin:0 0 14px;
    color:var(--muted);
    line-height:1.55;
  }
  .actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:22px;
  }
  a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:150px;
    padding:12px 16px;
    border-radius:14px;
    font-weight:700;
    text-decoration:none;
  }
  .primary{
    background:var(--accent);
    color:#101828;
  }
  .secondary{
    border:1px solid var(--line);
    color:var(--text);
  }
</style>
</head>
<body>
  <main class="card">
    <span class="badge">UIAT Norte</span>
    <h1>Sin conexión</h1>
    <p>La aplicación ya está instalada, pero esta pantalla necesita volver a conectarse para consultar datos actualizados del sistema.</p>
    <p>Cuando recuperes internet, recarga la página para seguir trabajando.</p>
    <div class="actions">
      <a class="primary" href="./index.php">Intentar de nuevo</a>
      <a class="secondary" href="./login.php">Ir al inicio</a>
    </div>
  </main>
</body>
</html>
